<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
	<style>
		.box
		{
			width:25%;
			height:25vh;
			/*border:solid 1px;*/
			margin:100px auto;
			box-shadow:
				inset 0px 0px 100px -50px #557755,
				0px 0px 100px 50px gray;
		}
		.box2
		{
			width:25%;
			height:25vh;
			/*border:solid 1px;*/
			margin:100px auto;
			box-shadow:
				inset 25px 25px 50px -10px blue, 
				inset -25px -25px 50px 5px green,
				50px 50px 50px 10px blue, 
				-50px -50px 50px 10px green 
				;
		}

	</style>
</head>
<body>
	<div class="box"></div>
	<div class="box2"></div>
</body>
</html>
