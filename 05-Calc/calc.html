<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
	<link rel="stylesheet" href="calc.css">
    <title>Калькулятор Windows XP</title>
</head>
<body>
	<div class="main-window">
		<div class="title-bar">
			<div class="title-bar-icon-and-signature">
				<img src="CalcXP.ico">
				&#8211 Калькулятор
			</div>
			<div class="title-bar-window-control-buttons">
				<button class="control-button"><div class="control-button-signature" style="margin-left:-5px;">&#x1F5D5</div></button>
				<button class="control-button" disabled><div class="control-button-signature">&#128470</div></button>
				<button class="control-button close-button"><div class="close-button-signature">&#10006</div></button>
			</div>
		</div>
		<!-- ------------------------------------------------------------- -->
		<div class="client-rect">
			<div class="work-area">
				<div class="menu-bar">
					<button>Правка</button>
					<button>Вид</button>
					<button>Справка</button>
				</div>
		<!-- ------------------------------------------------------------- -->
				<div class="display-container">
					<input type="text" id="display" value="0." disabled>
				</div>
		<!-- ------------------------------------------------------------- -->
				<div class="calc-buttons">
					<div class="square"></div>
					<div class="clear-buttons">
						<button>Backspace</button>
						<button>CE</button>
						<button>C</button>
					</div>
					<button>MC</button>
					<button>7</button>
					<button>8</button>
					<button>9</button>
					<button>/</button>
					<button>sqrt</button>
					
					<button>MR</button>
					<button>4</button>
					<button>5</button>
					<button>6</button>
					<button>*</button>
					<button>%</button>
					
					<button>MS</button>
					<button>1</button>
					<button>2</button>
					<button>3</button>
					<button>-</button>
					<button>1/x</button>
					
					<button>M+</button>
					<button>0</button>
					<button>+/-</button>
					<button>.</button>
					<button>+</button>
					<button>=</button>

				</div>
			</div>
		</div>
	</div>
</body>
</html>
